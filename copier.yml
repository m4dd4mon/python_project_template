# ── Meta-Felder ──────────────────────────────────────────────────────
# Dateien mit dieser Endung durchlaufen die Jinja-Engine und verlieren
# die Endung beim Rendern (z.B. pyproject.toml.jinja -> pyproject.toml).
_templates_suffix: .jinja

# Der Schablonenbaum liegt im Unterordner template/, damit die Meta-
# Dateien des Template-Repos (README, LICENSE, diese Datei) nicht
# versehentlich mit ins Zielprojekt wandern.
_subdirectory: template

# Schutz vor zu alten Copier-Versionen: Conditional tasks und die
# Whitespace-Trim-Semantik verhalten sich ab 9.x zuverlaessig.
_min_copier_version: "9.0.0"

# Standarddateiname fuer die Antwort-Datei im Zielprojekt. Wird dort
# ins Git eingecheckt und ist die Grundlage fuer spaetere copier update.
_answers_file: .copier-answers.yml

# Dateien und Muster, die NICHT ins Zielprojekt kopiert werden.
# Statische Muster wirken immer, konditionale Ausdruecke nur bei
# passender Feature-Antwort.
_exclude:
  - "*.pyc"
  - "__pycache__"
  - ".DS_Store"
  - "{% if not use_database %}docker-compose.yml{% endif %}"
  - "{% if not use_database %}alembic.ini{% endif %}"
  - "{% if not use_database %}alembic{% endif %}"
  - "{% if not use_database %}src/{{ package_slug }}/data{% endif %}"
  - "{% if not use_database %}scripts/migrate-all.sh{% endif %}"
  - "{% if not use_database %}scripts/migrate-all.ps1{% endif %}"
  - "{% if not use_web %}src/{{ package_slug }}/web{% endif %}"
  - "{% if not use_gui %}src/{{ package_slug }}/gui{% endif %}"
  - "{% if not use_cli %}src/{{ package_slug }}/cli{% endif %}"
  - "{% if not include_claude_md %}CLAUDE.md{% endif %}"

# Post-Generation-Tasks laufen nach dem Rendern im Zielverzeichnis.
# Reihenfolge beachten: git init vor uv sync, damit uv ein vorhandenes
# Repo sieht; git commit ganz am Schluss mit allem, was uv erzeugt hat.
_tasks:
  - "git init -b main"
  - "uv python pin {{ python_version }}"
  - "uv sync"
  - "git add ."
  - 'git commit -m "Initial commit from template"'


# ── Fragenkatalog ────────────────────────────────────────────────────
# Menschenlesbarer Projektname. Fliesst in README, pyproject.toml und
# (ueber den abgeleiteten Default) in den package_slug ein.
project_name:
  type: str
  help: "Menschenlesbarer Projektname (z.B. 'Wetterstation Berlin')"
  placeholder: "Mein Python-Projekt"

# Paket-Slug: gleichzeitig Ordnername des Zielprojekts und Python-
# Paketname unter src/. Ein einziger Slug statt zweier Varianten, siehe
# Phase A der Vorgehensweise. Default aus project_name abgeleitet,
# Validator verhindert Bindestriche und Grossbuchstaben.
package_slug:
  type: str
  help: >
    Python-Paketname unter src/. Nur Kleinbuchstaben, Ziffern und
    Unterstriche. Wird auch als Projektordnername verwendet.
  default: "{{ project_name | lower | replace(' ', '_') | replace('-', '_') }}"
  validator: >
    {% if not (package_slug | regex_search('^[a-z][a-z0-9_]*$')) %}
    Der Paketname muss mit einem Kleinbuchstaben beginnen und darf nur
    Kleinbuchstaben, Ziffern und Unterstriche enthalten (keine Bindestriche).
    {% endif %}

# Ein-Satz-Beschreibung fuer README und pyproject.toml.
project_description:
  type: str
  help: "Ein-Satz-Beschreibung fuer README und pyproject.toml"
  default: "Ein Python-Projekt mit uv, ruff und pytest."

# Autor fuer pyproject.toml [project].authors. Default auf eigenen Namen.
author_name:
  type: str
  help: "Autorenname fuer pyproject.toml"
  default: "m4dd4mon"

author_email:
  type: str
  help: "Autoren-Mail fuer pyproject.toml"
  default: "m4dd4mon@gmail.com"

# Python-Version wird per uv python pin festgeschrieben und in
# pyproject.toml als requires-python eingesetzt.
python_version:
  type: str
  help: "Python-Version zum Pinnen"
  choices:
    - "3.12"
    - "3.13"
    - "3.14"
  default: "3.14"

# ── Feature-Flags ────────────────────────────────────────────────────
# Bei use_database=true wird automatisch das Dual-DB-Setup aufgebaut
# (externe DB + lokale Docker-Instanz parallel, siehe Phase F).
use_database:
  type: bool
  help: "Datenbank-Support (SQLAlchemy, Alembic, Dual-DB-Setup)?"
  default: true

use_web:
  type: bool
  help: "Web-Oberflaeche (Dash/Flask/FastAPI) einbinden?"
  default: false

use_gui:
  type: bool
  help: "Desktop-GUI (Tkinter/PyQt) einbinden?"
  default: false

use_cli:
  type: bool
  help: "CLI-Einstiegspunkt einbinden?"
  default: true

# CLAUDE.md fuer Claude Code im Projektwurzelverzeichnis. Default true,
# weil die meisten Projekte Claude Code als Co-Arbeitswerkzeug nutzen.
include_claude_md:
  type: bool
  help: "CLAUDE.md fuer Claude Code erzeugen?"
  default: false

# Lizenz fuer das generierte Projekt. Bei "proprietary" wird im Template
# keine LICENSE-Datei angelegt (wird ueber _exclude in Prompt 7 gesteuert).
license:
  type: str
  help: "Lizenz des Projekts"
  choices:
    MIT: "MIT"
    Apache-2.0: "Apache-2.0"
    "Proprietaer (keine LICENSE-Datei)": "proprietary"
  default: "MIT"
