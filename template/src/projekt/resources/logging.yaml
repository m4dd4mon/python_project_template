# Logging-Konfiguration im dictConfig-Format.
# Wird ueber common.logging.setup_logging() geladen.

version: 1
disable_existing_loggers: false

formatters:
  detailed:
    format: "%(asctime)s | %(levelname)-8s | %(name)s:%(lineno)d | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: detailed
    stream: ext://sys.stdout

loggers:
  projekt:
    level: DEBUG
    handlers: [console]
    propagate: false

root:
  level: WARNING
  handlers: [console]
